apiVersion: apps/v1
kind: Deployment
metadata:
  name: demoproject-app-deployment
  labels:
    app: demoproject-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demoproject-app
  template:
    metadata:
      labels:
        app: demoproject-app
    spec:
      containers:
        - name: demoproject-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
